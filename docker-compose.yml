services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/TMS.API/Dockerfile
    container_name: tms-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TaskManagementDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Issuer: "TaskManagementSystem"
      Jwt__Audience: "TaskManagementSystemUsers"
      Jwt__Key: "docker-only-super-secret-signing-key-change-me-32chars"
      Jwt__ExpiryMinutes: "60"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tms-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
